[CONFIGURATION]
VERSION=1
AFFECTED_SECTIONS=BRAKEDISC_FX,COLORFUL_SHADOWING,DXGI_TWEAKS,EXTRA_FX,FAKE_SHADOWS_FX,GRAPHICS_ADJUSTMENTS,GRASS_FX,LIGHTING_FX,PARTICLES_FX,REFLECTIONS_FX,SHADOWED_WHEELS,SKIDMARKS_FX,SMART_SHADOWS,WEATHER_FX,WINDSCREEN_FX

[COLORFUL_SHADOWING:SHADOW]
MSAA_CUSTOM_KERNEL=0

[DXGI_TWEAKS:COMMON]
BACKGROUND_PAUSE=2

[EXTRA_FX:BASIC]
ENABLED=0

[EXTRA_FX:VOLUMETRIC_LIGHTS]
ENABLED=0

[EXTRA_FX:FOG_BLUR]
ENABLED=0

[EXTRA_FX:ASSAO]
ENABLED=1
OPACITY=0.5

[EXTRA_FX:SSLR]
ENABLED=0

[EXTRA_FX:TAA]
SAMPLE_SPREAD_MULT=0.3
HISTORY_SHARPEN=0.15
EXTRA_SHARPEN_PASS=0.25
BLUR_NEW=0.2
ENABLED=0

[EXTRA_FX:SS_LIGHTING]
ENABLED=0

[GRAPHICS_ADJUSTMENTS:ANTIALIASING]
FXAA3_EDGE_THRESHOLD=0.1
FXAA3_GREEN_AS_LUMA=0
FXAA3_QUALITY_SUBPIX=0.3
MODE=CMAA
QUALITY=ULTRA

[GRAPHICS_ADJUSTMENTS:SCRIPTABLE_FILTER]
ENABLED=1
IMPLEMENTATION=pure

[LIGHTING_FX:BASIC]
ENABLED=1

[LIGHTING_FX:BASIC]
BRIGHTNESS_MULT=1.3

[LIGHTING_FX:SHADOWS]
ENABLED=1
DETAILED_SHADOWS_FROM_CARS_NEARBY=0
CARS_SHADOWS=3
FULL_RESOLUTION=0

[PARTICLES_FX:SPARKS]
LIMIT=20000
SPAWN_RATE=200

[PARTICLES_FX:FIREWORKS]
ENABLED=0

[PARTICLES_FX:PIECES]
LIMIT=20000
SHOW_IN_MIRRORS=0

[PARTICLES_FX:FLAMES]
ENABLED=0

[REFLECTIONS_FX:MAIN_CUBEMAP]
RESOLUTION2=1024

[SMART_SHADOWS:BASIC]
ANISOTROPY=1
AUTOMATIC_SPLITS_LAMBDA=0.7
AUTOMATIC_SPLITS_DISTANCE=150

[WEATHER_FX:BASIC]
CONTROLLER='pureCtrl static'
IMPLEMENTATION=Pure LCS

[WEATHER_FX:PP_FIRST_PERSON_VIEW]
NO_CHROMATIC_ABERRATION=1

[WEATHER_FX:__PLUGINS]
IMPLEMENTATION_SETTINGS=

[WINDSCREEN_FX:REFLECTION]
INTENSITY_MULT=0.03
ENABLED=1